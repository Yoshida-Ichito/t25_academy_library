<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍登録',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/add.css}" />
    <script type="text/javascript" th:src="@{/js/book/add.js}"></script>
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍登録</div>
                <div class="page_contents">
                    <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/add}" method="post">
                        <div class="mb30 flexarea">
                            <h3 style="color: red;">*は必須項目です</h3>
                            <span>
                                <a th:href="@{/book/index}" class="link">← 一覧へ戻る</a>
                            </span>
                        </div>
                    
                        <div class="form_group">
                            <label for="bookname">書籍名<span style="color: red;">*</span></label>
                            <input class="form_input" type="text" id="bookname" name="title" th:field="*{title}">
                            <ul th:if="${titleErrors}" class="error_msg" th:each="err : ${titleErrors}">
                                <li th:text="${err}"></li>
                            </ul>
                        </div>
                        
                        <div class="form_group">
                            <label for="isbn">ISBN<span style="color: red;">*</span></label>
                            <input class="form_input" type="text" id="isbn" name="isbn" th:field="*{isbn}">
                            <ul th:if="${isbnErrors}" class="error_msg" th:each="err : ${isbnErrors}">
                                <li th:text="${err}"></li>
                            </ul>
                        </div>
                        <div class="btn_block">
                            <button type="submit" id="submit_btn">保存</button>
                        </div>
                    </form>                    
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
